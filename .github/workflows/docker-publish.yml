name: Build Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
 
      - name: Login to DockerHub
        uses: docker/login-actions@v3
        with:
          username: ${{ secerts.DOCKER_USERNAME }}
          password: ${{ secerts.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t my-app:latest .

      - name: Tag Image
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)

          docker tag my-app:latest YOUR_DOCKER_USERNAME/YOUR_REPOSITORY_NAME:latest
          docker tag my-app:latest YOUR_DOCKER_USERNAME/YOUR_REPOSITORY_NAME:sha-$SHORT_SHA

      - name: Push Images
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)

          docker push YOUR_DOCKER_USERNAME/YOUR_REPOSITORY_NAME:latest
          docker push YOUR_DOCKER_USERNAME/YOUR_REPOSITORY_NAME:sha-$SHORT_SHA
