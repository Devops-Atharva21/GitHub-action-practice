name: Build Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
 
      - name: Login to DockerHub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t my-app:latest .

      - name: Tag Image
        if: github.ref == 'refs/heads/main'
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)

          docker tag my-app:latest dockeratharva29/my-app:latest
          docker tag my-app:latest dockeratharva29/my-app:sha-$SHORT_SHA

      - name: Push Images
        if: github.ref == 'refs/heads/main'
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)

          docker push dockeratharva29/my-app:latest
          docker push dockeratharva29/my-app:sha-$SHORT_SHA
