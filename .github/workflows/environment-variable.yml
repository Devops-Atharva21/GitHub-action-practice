name: Enviroment Variable Demo

on:
  workflow_dispatch:

env:
  APP_NAME: my_app

jobs:
  show-env:
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: staging

    steps:
      - name: Print Environment Variables
        env:
          VERSION: 1.0.0

        run: |
          echo "Commit SHA: ${{ github.sha }}"
          echo "Trigggered By: ${{ github.actor }}"
          
