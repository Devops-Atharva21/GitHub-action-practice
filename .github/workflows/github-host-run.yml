name: Github-Hosted-Runner
on:
  workflow_dispatch:

jobs:
  ubuntu-job:
    runs-on: ubuntu-latest

    steps: 
      - name: Print Runner Info
        run : |
          echo "Operating System"
          uname -a
          echo "Hostname:"
          hostname -i
          echo "Current User"
          whoami

  window-job:
    runs-on: windows-latest

    steps:
      - name: Print Runner Info
        run: |
          echo "Operating System"
          uname -a
          echo "Hostname:"
          hostname -i
          echo "Current User"
          whoami

  macos-job:
    runs-on: macos-latest

    steps:
      - name: Print Runner Info
        run: |
          echo "Operating System"
          uname -a
          echo "Hostname:"
          hostname -i
          echo "Current User"
          whoami

