name: Pull Request

on:
  pull_request
    branches:
    - main
    types:
      - opened
      - synchronize


jobs:
 pr-check:
    name: Checkout Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prints the PR directory
        run: echo "PR check running for branch: ${{ github.head_ref }}"
