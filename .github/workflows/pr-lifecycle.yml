name: Pull Request Lifecycle

on: 
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed

jobs:
  pr-events:
    runs-on: ubuntu-latest

    steps:
      - name: Print Event Type
        run: echo "Event Type = ${{ github.event.action }}"

      - name: Print PR Title
        run: echo "PR Title = ${{ github.event.pull.request.title }}"

      - name: Print PR Author
        run: echo "Author = ${{ github.event.pull_request.user.login }}"

      - name: Print Source and Target Branch
        run: |
          echo "Source Branch = ${{ github.head_ref }}"
          echo "Target Branch = ${{ github.base_ref }}"

      - name: Run only when PR is merged
        if: github.event.pull_request.merged == true
        run: echo "🎉 Pull Request was merged successfully!"

