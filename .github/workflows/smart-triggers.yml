name: Smart Triggers - Paths

on:
  push:
    branches:
      - main
      - 'release/**'

    paths:
      - 'src/**'
      - 'app/**'

jobs:
  path-filter-check:
    runs-on: ubuntu-latest

    steps:
      - name: Display Trigger Information
        run: |
          echo "✅ Workflow triggered."
          echo "Branch: ${{ github.ref_name }}"
          echo "Relevant changes detected in src/ or app/."
        
